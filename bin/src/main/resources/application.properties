spring.application.name=SweetScoopBack

# ==========================
# JPA / Hibernate SQL 로그 출력
# ==========================
# 1. 하이버네이트가 생성한 SQL문을 콘솔창에 출력합니다.
spring.jpa.show-sql=true

# 2. 콘솔에 출력되는 SQL문을 보기 좋게 줄바꿈(포맷팅) 해줍니다.
spring.jpa.properties.hibernate.format_sql=true

# 3. SQL 쿼리에 바인딩되는 실제 파라미터 값(예: ? 자리에 들어가는 '엄마는 외계인' 등)을 콘솔에 보여줍니다.
logging.level.org.hibernate.orm.jdbc.bind=trace

# ==========================
# MyBatis SQL 로그 출력 (이미 작성되어 있는 패키지명 반영)
# ==========================
# MyBatis가 돌리는 쿼리 로그를 콘솔에 디버그 모드로 출력합니다.
logging.level.com.sweetscoop.admin.repository=DEBUG
