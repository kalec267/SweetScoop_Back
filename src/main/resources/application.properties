spring.application.name=SweetScoopBack

# 서버 포트
server.port=8888

# ==========================
# MySQL
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/sweetscoop?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# MyBatis
# ==========================
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=order.entity

# 컬럼명(snake_case) → 변수명(camelCase) 자동 변환
mybatis.configuration.map-underscore-to-camel-case=true

# SQL 로그 출력(선택)
logging.level.order.repository=DEBUG