<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>품목 등록</title>
</head>

<body>

<h1>품목 등록</h1>

<form th:action="@{/items}" 
      th:object="${item}" 
      method="post">

    <div>
        <label>카테고리 ID</label>
        <input type="number" th:field="*{categoryId}">
    </div>

    <div>
        <label>단위</label>
        <input type="number" th:field="*{unit}">
    </div>

    <div>
        <label>품목명</label>
        <input type="text" th:field="*{itemName}">
    </div>

    <button type="submit">
        등록
    </button>

</form>

</body>
</html>
